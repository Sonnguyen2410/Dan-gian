<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dan Gian - Luat choi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@latest/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Dan Gian</h1>
        <nav class="site-nav">
          <a href="../index.html">Trang chủ</a>
          <a href="goc-tich.html">óc tích</a>
          <a href="phan-loai.html">Phân loại</a>
          <a href="luat-choi.html" class="active">Luật chơi</a>
          <a href="trai-nghiem.html">Trải nghiệm</a>
        </nav>
      </div>
    </header>

    <main class="container page-main">
      <section class="rules-section">
        <div class="section-heading">
          <h2>Luật chơi</h2>
        </div>

        <div class="rules-carousel swiper" data-rules-carousel>
          <div class="swiper-wrapper rules-track" data-rules-track>
            <button class="rule-card swiper-slide" type="button" data-title="Bat dau luot choi" data-detail="Moi luot choi bat dau khi tat ca nguoi tham gia da san sang. Hay doc ky luat truoc khi bat dau de tranh nham lan.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/Ô ĂN QUAN.png" alt="Ô Ăn Quan" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Luot di dung thu tu" data-detail="Nguoi choi di theo thu tu da thong nhat. Khong duoc chen luot hoac bo qua nguoi den phien.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/ĐÁNH ĐU.png" alt="Đánh đu" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Tinh diem" data-detail="Diem so duoc tinh theo ket qua tung vong. Neu co tranh chap, nguoi quan ly se dua ra quyet dinh cuoi cung.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/ĐI CÀ KHEO.png" alt="Đi cà kheo" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Thang va ket thuc" data-detail="Nguoi co diem cao nhat khi ket thuc luot choi se gianh chien thang. Neu hoa diem, tiep tuc them vong phu." >
              <img class="rule-image" src="../THẺ LUẬT CHƠI/KÉO CƯA LỪA XẺ.png" alt="Kéo cưa lừa xẻ" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Luu y an toan" data-detail="Hay dam bao khong gian choi an toan, tranh chen lan va luon ton trong nguoi khac trong qua trinh tro choi.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/RỒNG RẮN LÊN MÂY.png" alt="Rồng rắn lên mây" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Đập niêu đất" data-detail="Ảnh thẻ luật chơi cho trò Đập niêu đất.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/ĐẬP NIÊU ĐẤT.png" alt="Đập niêu đất" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Đẩy gậy" data-detail="Ảnh thẻ luật chơi cho trò Đẩy gậy.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/ĐẨY GẬY.png" alt="Đẩy gậy" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Ném còn" data-detail="Ảnh thẻ luật chơi cho trò Ném còn.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/NÉM CÒN.png" alt="Ném còn" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Nu na nu nống" data-detail="Ảnh thẻ luật chơi cho trò Nu na nu nống.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/NU NA NU NỐNG.png" alt="Nu na nu nống" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Nhảy sạp" data-detail="Ảnh thẻ luật chơi cho trò Nhảy sạp.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/NHẢY SẠP.png" alt="Nhảy sạp" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Nhảy bao bố" data-detail="Ảnh thẻ luật chơi cho trò Nhảy bao bố.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/NHẢY BAO BỐ.png" alt="Nhảy bao bố" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Mèo đuổi chuột" data-detail="Ảnh thẻ luật chơi cho trò Mèo đuổi chuột.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/MÈO ĐUỔI CHUỘT.png" alt="Mèo đuổi chuột" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Cướp cờ" data-detail="Ảnh thẻ luật chơi cho trò Cướp cờ.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/CƯỚP CỜ.png" alt="Cướp cờ" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Cá sấu lên bờ" data-detail="Ảnh thẻ luật chơi cho trò Cá sấu lên bờ.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/CÁ SẤU LÊN BỜ.png" alt="Cá sấu lên bờ" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Chơi chuyền" data-detail="Ảnh thẻ luật chơi cho trò Chơi chuyền.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/CHƠI CHUYỀN.png" alt="Chơi chuyền" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Chi chi chành chành" data-detail="Ảnh thẻ luật chơi cho trò Chi chi chành chành.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/CHI CHI CHÀNH CHÀNH.png" alt="Chi chi chành chành" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Bịt mắt bắt dê" data-detail="Ảnh thẻ luật chơi cho trò Bịt mắt bắt dê.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/bịt mắt bắt dê.png" alt="Bịt mắt bắt dê" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Tàu hỏa" data-detail="Ảnh thẻ luật chơi cho trò Tàu hỏa.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/TÀU HOẢ.png" alt="Tàu hỏa" />
            </button>

            <button class="rule-card swiper-slide" type="button" data-title="Thả đỉa ba ba" data-detail="Ảnh thẻ luật chơi cho trò Thả đỉa ba ba.">
              <img class="rule-image" src="../THẺ LUẬT CHƠI/THẢ ĐỈA BA BA.png" alt="Thả đỉa ba ba" />
            </button>
          </div>
        </div>
      </section>
    </main>

    <div class="rule-modal" data-rule-modal hidden>
      <div class="rule-modal__overlay" data-rule-modal-close></div>
      <div class="rule-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="rule-modal-title">
        <button class="rule-modal__close" type="button" data-rule-modal-close aria-label="Dong popup">&times;</button>
        <p class="rule-modal__eyebrow">Mat sau the luat choi</p>
        <h3 id="rule-modal-title"></h3>
        <div class="rule-modal__media">
          <img id="rule-modal-image" alt="" loading="lazy" />
        </div>
        <p id="rule-modal-content" class="rule-modal__fallback" hidden></p>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 Dan Gian</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@latest/swiper-bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
